name: Generate Datas

permissions:
  contents: write

on:
  schedule:
    - cron: "* */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Checkout do repositório
      - uses: actions/checkout@v3

      # Gerador da animação da cobrinha (Versão Atualizada)
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: IanzZm
          outputs: |
            dist/github-contribution-grid-snake.svg

      # Faz o deploy para a branch "output"
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}